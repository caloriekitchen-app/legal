name: Regenerate legal HTML

on:
  push:
    branches: [main]
    paths:
      - 'privacy.json'
      - 'terms.json'
      - 'generate.mjs'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate HTML from JSON
        run: node generate.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add privacy-policy.html terms.html
          git diff --cached --quiet || git commit -m "Regenerate HTML from privacy.json/terms.json [skip ci]"
          git push
